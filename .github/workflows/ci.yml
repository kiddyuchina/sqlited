name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files need formatting:"
            gofmt -l .
            exit 1
          fi

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -count=1 ./...

      - name: Integration tests
        run: go test -count=1 -tags=integration ./...

  build-release:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o sqlited-linux-amd64 .

      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o sqlited-windows-amd64.exe .

      - name: Build macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -o sqlited-darwin-amd64 .

      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o sqlited-darwin-arm64 .

      - uses: actions/upload-artifact@v4
        with:
          name: sqlited-binaries
          path: sqlited-*
